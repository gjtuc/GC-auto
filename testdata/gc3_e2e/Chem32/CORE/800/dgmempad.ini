;===========================================
; defines MemPad
; 
;===========================================
[GraphicalObject]
Name=memPad
Path=DiagTop
PosStyle=VARIABLE
WndStyle=
x=512
y=0
width=287
height=440
Activate=1
Set0="BMP.dgMP|dgChangeDiagHelpIndex EMFPAD| "
Set1="BMP.dgMP1|dgChangeDiagHelpIndex MEMPAD| "
Set2="BMP.dgMP2|dgChangeDiagHelpIndex CCPAD| "
Set3="BMP.dgMP3|dgChangeDiagHelpIndex CCPAD| "

[ToolDescriptor] 
1=headerCol1, STATIC       ,hpgwct02.dll
2=headerCol2, STATIC       ,hpgwct02.dll
3=memPadTap,  STATIC       ,hpgwct02.dll
4=ccpTap,     STATIC       ,hpgwct02.dll
5=eraseLine,  PUSHBUTTON   ,hpgbut02.dll
6=sendChanges,PUSHBUTTON   ,hpgbut02.dll
7=undo,     PUSHBUTTON   ,hpgbut02.dll
8=repairP,     PUSHBUTTON   ,hpgbut02.dll
9=HelpB,       PUSHBUTTON   ,hpgbut02.dll
10=EMFsendChanges,PUSHBUTTON   ,hpgbut02.dll
11=EMFundo,     PUSHBUTTON   ,hpgbut02.dll

