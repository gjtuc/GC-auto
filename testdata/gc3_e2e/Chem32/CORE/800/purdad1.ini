[GraphicalObject]
Name=PURDAD
Path=
Title=
WndStyle=thickframe ; dlgframe;TOOLBAR ; 
PosStyle=fixed; variable ; BOTTOM ; TOP ;
X=0
Y=0
Width=800
Height=38
FrameThickness=0
Activate=0
EraseBk=0
Set0=
RC-DLL=HPCor008.DLL

[ToolDescriptor]
1  = PrevImpPeak, PUSHBUTTON, hpgbut02.dll
2  = PrevPeak,    PUSHBUTTON, hpgbut02.dll
3  = PeakNumber,  STATIC,     HPGWCT02.DLL
4  = NextPeak,    PUSHBUTTON, hpgbut02.dll
5  = PrevNextPeak,PUSHBUTTON, hpgbut02.dll
6  = Detector,    STATIC,     HPGWCT02.DLL
7  = PurityInfo,  STATIC,     HPGWCT02.DLL
8  = MoreInfo,    PUSHBUTTON, hpgbut02.dll
9  = IsoPlot,     PUSHBUTTON, hpgbut02.dll
10 = TDPlot,      PUSHBUTTON, hpgbut02.dll
11 = Print,       PUSHBUTTON, hpgbut02.dll
12 = Close,       PUSHBUTTON, hpgbut02.dll

[PushButton PrevImpPeak]
ImageList=TXT.<|TXT.<|TXT.<|
x=2
y=8
width=18
height=18
Command=PUR_StatusBarFunction "PrevImpure","DAD"
Help=Select previous 'impure' peak
Color=254,0,0
FrameThickness=1

[PushButton PrevPeak]
ImageList=TXT.<|TXT.<|TXT.<|
x=20
y=8
width=18
height=18
Command=PUR_StatusBarFunction "PrevPeak","DAD"
Help=Select previous peak
FrameThickness=1

[STATIC PeakNumber]
Text1=--
BKColor=192,192,192 ; 255,255,255
Enable=1
Dimage=4
Justify=Center
x=41
y=8
width=112
height=18
Help=Number and time of current peak
; Cursor=IDC_ICON
; command=PUR_StatusBarFunction "PeakInfo","DAD"
Font=Helv,8,normal
FrameThickness=1

[PushButton NextPeak]
ImageList=TXT.>|TXT.>|TXT.>|
x=155
y=8
width=18
height=18
Command=PUR_StatusBarFunction "NextPeak","DAD"
Help=Select next peak
FrameThickness=1

[PushButton PrevNextPeak]
ImageList=TXT.>|TXT.>|TXT.>|
x=172
y=8
width=18
height=18
Command=PUR_StatusBarFunction "NextImpure","DAD"
Help=Select next 'impure' peak
Color=254,0,0
FrameThickness=1

[STATIC Detector]
Text1=   
BKColor=192,192,192
Enable=1
Dimage=4
Justify=Right ; Center
x=200
y=10
width=0 ; 30
height=18
Help=Information on the Peak Purity
Command=PUR_StatusBarFunction "PurInfo","DAD"
Cursor=IDC_ICON
Font=Helv,8,bold
FrameThickness=0

[STATIC PurityInfo]
Text1=-- no info --
BKColor=192,192,192
Enable=1
Dimage=4
Justify=Center
x=215 ; 235
y=8
width=400
height=18
Help=Information on the Peak Purity
; Command=PUR_StatusBarFunction "PurInfo","DAD"
; Cursor=IDC_ICON
Font=Helv,8,bold
FrameThickness=1

[PushButton MoreInfo]
ImageList=RBMP.InfoS24|RBMP.InfoS24|RBMP.InfoS24|
x=641
y=2
width=28
height=28
Command=PUR_StatusBarFunction "PurInfo","DAD"
Help=Information on the LC Peak Purity
FrameThickness=1

[PushButton IsoPlot]
ImageList=RBMP.PurDispIP|RBMP.PurDispIP|RBMP.PurDispIP|
x=674; 727
y=2
width=28
height=28
Command=PUR_StatusBarFunction "IsoPlot","DAD"
Help=Make Iso-Plot of spectra of selected peak
FrameThickness=1

[PushButton TDPlot]
ImageList=RBMP.PurDisp3D|RBMP.PurDisp3D|RBMP.PurDisp3D|
x=702 ; 755
y=2
width=28
height=28
Command=PUR_StatusBarFunction "TDPlot","DAD"
Help=Make 3D-Plot of spectra of selected peak
FrameThickness=1

[PushButton Print]
ImageList=RBMP.PrintS24|RBMP.PrintS24|RBMP.PrintS24|
x=734
y=2
width=28
height=28
Command=PUR_StatusBarFunction "Print","DAD"
Help=Makea printout of the current peak purity
FrameThickness=1

[PushButton Close]
ImageList=RBMP.CloseS24|RBMP.CloseS24|RBMP.CloseS24|
x=766
y=2
width=28
height=28
Command = PUR_StatusBarFunction "Close","DAD"
Help=Close the Peak Purity display
FrameThickness=1
