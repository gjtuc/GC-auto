; These item will be read in during initialization.  Each item will
;   be added to the FEATURES table in _Config[1] with the type
;   specified.  Valid types are "int", "double", or "string".       

[FEATURES]
; maximum number of injectors that can be added to the system
MaxInjectors=int

; turns SignalDetails dlg box off/on
SignalDetails=int

; turns Instrument Curves dlgbox off/on
InstCurves=int

BalanceButton=int

; if SpectraAllowed is set to 1, the user would like spectra
; capabilities IF THE LICENSE ALLOWS THIS.  
SpectraAllowed=int

; This is the name of the macro that grabs information about instrument
; conditions and puts it into ChromRes, so that the print report macro
; can pick it up later.
InstCondMac=string

; use CE terminology, e.g. "Migration Time" (1) instead of "Retention Time" (0)
HPCETerms=int

; title of the application in the welcome message and similar places
AppTitleText=string

; keep the Background bitmap (1) or not (0) after end of initialization
Background=int

; name of the default method file (.M directory)
DefMethodFile=string

; name of the default sequence file (.S file)
DefSeqFile=string

; type of analytical column / capillary; controls edit and print of parameters
; 1: LC, LC3D
; 2: CE
; 3: GC
ColumnType=int

; column switching possible (1) or not (0); controls number of columns
; for which the parameters can be edited and printed
ColumnSwitch=int

; injection volume is to be reported (1) or not (0)
InjectionVolume=int

; List of shutdown macros that appear in
; combo box in Sequence Parameters screen.
; This list contains the items separated by vertical bars
; For example:  SeqShutdownMacs=Item1 | Item2 | Item3
SeqShutdownMacs=string

; The sequence parameters dialog box to use
; 0 - Box 0 (typically used for LC)
; 1 - Box 1 (typically used for GC)
SeqParmsBox=int

; The Import Menu Items to use.  Each bit represents a different 
; set of import menu items (1 means include these items):
; Bit 0 (low order bit) - GC
; Bit 1                 - LC
ImportMenuItems=int

; The print method dialog box to use
; 0 - Box 0 (typically used for LC)
; 1 - Box 1 (typically used for GC)
PrintMthBox=int

; Allow to create a calibration table with a empty signal table by
; using a signal with empty signal description.
; This serves during IdentifyPeaks as a default for all signals in the
: data file that have no explicit signal description in the signal table.
; 0: LC, CE
; 1: GC
EmptySignal=int

; Use signal correlation for multiple signals
; 0: GC
; 1: LC, CE
SignalCorrelate=int

; Interpretation of the UnkCompRF field in the _DAMethod[1],QuantParms table
; in the case where an ISTD compound is given as reference (UnkCompISTD):
; 0: no ISTD correction (this value is not really useful)
; 1: UnkCompRF is interpreted as absolute response factor (i.e. the response
;    factor of the ISTD will be taken into calculation as well); usually then
;    UnkCompRF is "far away" from 1.
; 2: UnkCompRF is interpreted as relative response factor (i.e. it is assumed
;    that UnkCompRF is the ratio of the response factor of the unknown divided
;    by the response factor of the ISTD); usually then UnkCompRF is close to 1.
;    Used for GC, LC, CE
UnkCompISTDRF=int

; Enable the Area Calculation Mode.
; (NormalizedArea field in the _DAMethod[1],QuantParms table)
; 0: GC, LC
; 1: CE
AreaCalcMode=int

; Default initial peak width for the integrator
; Used if the default method is constructed because no damethod.reg is found.
InitWidth=double

; Peak Summing flag
; 0:  No peak summing is allowed
; 1:  Peak summing is allowed.
PeakSumming=int

; If MSAllowed == 1, then allow MS capabilities 
MSAllowed=int

; TEMPORARY!!!!!  jtg
OldLoadSigBox=int

; name of the default method file (.M directory)
OldDefMethFile=string




