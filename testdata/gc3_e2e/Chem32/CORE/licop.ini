; The entries in this file are only needed for single modules with a
; direct physical link to the PC. For each of these modules a driver
; must be referenced in the [PCS] section of win.ini by a deviceX= line,
; further defined in hp-lc.ini:
;
;       +----+            +--------+
;       | PC |============| Module |
;       +----+            +--------+
;
; It could be one or several modules, but each connected / controlled
; directly from the PC with it's own driver specified in [PCS] section
; of win.ini and hp-lc.ini:
;
;       +----+            +--------+
;       | PC |===#========| Module |
;       +----+   "        +--------+
;                "
;                "        +--------+
;                #========| Module |
;                "        +--------+
;                "
;                "        +--------+
;                #========| Module |
;                         +--------+
;
; Even if there exists a CAN connection between these modules, they could
; be directly controlled with the help of this file, if each module has
; a direct physical link to the PC correctly specified in win.ini and
; hp-lc.ini:
;
;       +----+            +--------+
;       | PC |===#========| Module |==#
;       +----+   "        +--------+  "
;                "                    "
;                "        +--------+  "
;                #========| Module |==#
;                "        +--------+  "
;                "                    "
;                "        +--------+  "
;                #========| Module |==#
;                         +--------+
;
; Other than for these previously mentioned direct access configurations
; this file is not needed and could / should be removed !!
;
; For those clusters of modules connected by CAN and accessed through
; a single commonly used / multiplexed physical link, a cluster driver
; would do the configuration / mapping instead of this file. This approach
; provides much more flexibility allowing online changes of configuration
; in contrast to the static entries otherwise needed in win.ini and
; hp-lc.ini. Then only this single cluster driver has to be referenced
; in [PSC] section of win.ini by a deviceX= line and further defined in
; hp-lc.ini:
;
;       +----+            +--------+
;       | PC |============| Module |==#
;       +----+            +--------+  "
;                                     "
;                         +--------+  "
;                         | Module |==#
;                         +--------+  "
;                                     "
;                         +--------+  "
;                         | Module |==#
;                         +--------+
;

; The file specifies how LICOP has to translate the CU definition of
; the APG_TOP.EXE and the driver into a CU name available in a given
; single module.


