[GraphicalObject]
Name=MsFault
PosStyle=VARIABLE
WndStyle=THICKFRAME|CAPTION|SYSMENU
Caption=Ms Fault Report
x= 100
y= 50
width=695
height=295
Activate=1
Set0=||

[ToolDescriptor]
1=Table,   childwnd   ,hpgwct02.dll
2=Print ,  PUSHBUTTON ,hpgbut02.dll
3=help  ,  PUSHBUTTON ,hpgbut02.dll
4=Actual,  STATIC     ,hpgwct02.dll
5=Tune  ,  STATIC     ,hpgwct02.dll
6=Logbk ,  STATIC     ,hpgwct02.dll

[PUSHBUTTON Print]
x=581
y=2
width=50
height=43
State=0
Enable=1
FrameThickness=1
ImageList=BMP.dgPrintA|BMP.dgPrinti|BMP.dgPrinti|BMP.dgPrinti
Command=dgMsPrintReportFault

[PUSHBUTTON help]
x=633
y=2
width=50
height=43
State=0
Enable=1
FrameThickness=1
ImageList=BMP.dgHelpi|BMP.dgHelpi|BMP.dgHelpi|BMP.dgHelpi
Command=help HelpSubsystemTopic("MSD",7005)

[CHILDWND Table]
x=0 
y=56
width=683
height=200
CHILDDLL=hpgtw_01.dlc          ;Contains the Table shell
CHILDCREATEFCT=GomTabCreate    ;Function to create the table
CHILDNAME=dgmsfault[1], fault, DDTMsFault, 10, CP2, 8388608
CHILDREFERENCENO=1	       ;Window number


[STATIC Tune]
x=35
y=2
width=530
height=16
Enable=1
Frame=0
