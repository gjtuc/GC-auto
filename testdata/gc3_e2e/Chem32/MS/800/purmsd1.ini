[GraphicalObject]
Name=PURMSD
Path=
Title=
WndStyle=thickframe ; dlgframe;TOOLBAR ; 
PosStyle=fixed; variable ; BOTTOM ; TOP ;
X=0
Y=0
Width=800
Height=38
FrameThickness=0
Activate=0
EraseBk=0
Set0=
RC-DLL=HPCor008.DLL

[ToolDescriptor]
1  = PrevImpPeak, PUSHBUTTON, hpgbut02.dll
2  = PrevPeak,    PUSHBUTTON, hpgbut02.dll
3  = PeakNumber,  STATIC,     HPGWCT02.DLL
4  = NextPeak,    PUSHBUTTON, hpgbut02.dll
5  = PrevNextPeak,PUSHBUTTON, hpgbut02.dll
6  = Detector,    STATIC,     HPGWCT02.DLL
7  = PurityInfo,  STATIC,     HPGWCT02.DLL
8  = Print,       PUSHBUTTON, hpgbut02.dll
9  = Close,       PUSHBUTTON, hpgbut02.dll

[PushButton PrevImpPeak]
ImageList=TXT.<|TXT.<|TXT.<|
x=2
y=8
width=18
height=18
Command=PUR_StatusBarFunction "PrevImpure","MSD"
Help=Select previous 'impure' peak
Color=254,0,0
FrameThickness=1

[PushButton PrevPeak]
ImageList=TXT.<|TXT.<|TXT.<|
x=20
y=8
width=18
height=18
Command=PUR_StatusBarFunction "PrevPeak","MSD"
Help=Select previous peak
FrameThickness=1

[STATIC PeakNumber]
Text1=---
BKColor=192,192,192 ; 255,255,255
Enable=1
Dimage=4
Justify=Center
x=41
y=8
width=112
height=18
Help=Number and time of current peak
;Cursor=IDC_ICON
;command=PUR_StatusBarFunction "PeakInfo","MSD"
Font=Helv,8,normal
FrameThickness=1

[PushButton NextPeak]
ImageList=TXT.>|TXT.>|TXT.>|
x=155
y=8
width=18
height=18
Command=PUR_StatusBarFunction "NextPeak","MSD"
Help=Select next peak
FrameThickness=1

[PushButton PrevNextPeak]
ImageList=TXT.>|TXT.>|TXT.>|
x=172
y=8
width=18
height=18
Command=PUR_StatusBarFunction NextImpure,"MSD"
Help=Select next 'impure' peak
Color=254,0,0
FrameThickness=1

[STATIC Detector]
Text1=
BKColor=192,192,192
Enable=1
Dimage=4
Justify=Right ; Center
x=200
y=10
width=0 ; 30
height=18
Help=Information on the Peak Purity
Command=PUR_StatusBarFunction "PurInfo","MSD"
Cursor=IDC_ICON
Font=Helv,8,bold
FrameThickness=0

[STATIC PurityInfo]
Text1=-- no info --
BKColor=192,192,192
Enable=1
Dimage=4
Justify=Center
x=215 ; 235
y=8
width=400
height=18
Help=Information on the Peak Purity
; Command=PUR_StatusBarFunction "PurInfo","MSD"
; Cursor=IDC_ICON
Font=Helv,8,bold
FrameThickness=1

[PushButton Print]
ImageList=RBMP.PrintS24|RBMP.PrintS24|RBMP.PrintS24|
x=641
y=2
width=28
height=28
Command=PUR_StatusBarFunction "Print","MSD"
Help=Make a printout of the current peak purity
FrameThickness=1

[PushButton Close]
ImageList=RBMP.CloseS24|RBMP.CloseS24|RBMP.CloseS24|
x=673
y=2
width=28
height=28
Command = PUR_StatusBarFunction "Close","MSD"
Help=Close the Peak Purity Display
FrameThickness=1





