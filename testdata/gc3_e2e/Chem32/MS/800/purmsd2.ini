[GraphicalObject]
Name=PURMSD
Path=
Title=
WndStyle=thickframe ; dlgframe; TOOLBAR ; 
PosStyle=fixed ; variable; BOTTOM ; TOP ;
X=0
Y=0
Width=400
Height=45
FrameThickness=0
Activate=0
EraseBk=0
Set0=
Color=ToolBackground
RC-DLL=HPCor008.DLL

[ToolDescriptor]
1  = PrevImpPeak, PUSHBUTTON, hpgbut02.dll
2  = PrevPeak,    PUSHBUTTON, hpgbut02.dll
3  = PeakNumber,  STATIC,     HPGWCT02.DLL
4  = NextPeak,    PUSHBUTTON, hpgbut02.dll
5  = PrevNextPeak,PUSHBUTTON, hpgbut02.dll
6  = Detector,    STATIC,     HPGWCT02.DLL
7  = PurityInfo,  STATIC,     HPGWCT02.DLL
8  = Print,       PUSHBUTTON, hpgbut02.dll
9  = Close,       PUSHBUTTON, hpgbut02.dll

[ColorAlias]
1=ToolBackground | 192,192,192 ; 255,255,255

[PushButton PrevImpPeak]
ImageList=TXT.<|TXT.<|TXT.<|
x=67
y=20
width=18
height=15
Command=PUR_StatusBarFunction PrevImpure,"MSD"
Help=Select previous 'impure' peak
Color=254,0,0
FrameThickness=1

[PushButton PrevPeak]
ImageList=TXT.<|TXT.<|TXT.<|
x=85
y=20
width=18
height=15
Command=PUR_StatusBarFunction "PrevPeak","MSD"
Help=Select previous peak
FrameThickness=1

[STATIC PeakNumber]
Text1=--
BKColor=ToolBackground
Enable=1
Dimage=4
Justify=Center
x=106
y=20
width=112
height=15
Help=Number and time of current peak
; Cursor=IDC_ICON
; command=PUR_StatusBarFunction "PeakInfo","MSD"
Font=Helv,6,normal
FrameThickness=1

[PushButton NextPeak]
ImageList=TXT.>|TXT.>|TXT.>|
x=220
y=20
width=18
height=15
Command=PUR_StatusBarFunction "NextPeak","MSD"
Help=Select next peak
FrameThickness=1

[PushButton PrevNextPeak]
ImageList=TXT.>|TXT.>|TXT.>|
x=238
y=20
width=18
height=15
Command=PUR_StatusBarFunction "NextImpure","MSD"
Help=Select next 'impure' peak
Color=254,0,0
FrameThickness=1

[STATIC Detector]
Text1=MSD
BKColor=ToolBackground
Enable=1
Dimage=4
Justify=Right ; Center
x=20
y=20
width=30
height=15
Help=Information on the Peak Purity
; Command=PUR_StatusBarFunction "PurInfo","MSD"
; Cursor=IDC_ICON
Font=Helv,8,bold
FrameThickness=0

[STATIC PurityInfo]
Text1=-- no info --
BKColor=192,192,192
Enable=1
Dimage=4
Justify=Center
x=3
y=2
width=350
height=15
Help=Information on the Peak Purity
; Command=PUR_StatusBarFunction "PurInfo","MSD"
; Cursor=IDC_ICON
Font=Helv,8,bold
FrameThickness=1

[PushButton MoreInfo]
ImageList=RBMP.InfoS24|RBMP.InfoS24|RBMP.InfoS24|
x=356
y=2
width=32
height=15
Command=PUR_StatusBarFunction "PurInfo","MSD"
Help=Information on the LC Peak Purity
FrameThickness=1

[PushButton Print]
ImageList=RBMP.PrintS24|RBMP.PrintS24|RBMP.PrintS24|
x=276
y=20
width=28
height=15
Command=PUR_StatusBarFunction "Print","MSD"
Help=Make a printout of the current peak purity
FrameThickness=1

[PushButton Close]
ImageList=TXT.Close|TXT.Close|TXT.Close| ; RBMP.LIBRARYCLOSE|RBMP.LIBRARYCLOSE|RBMP.LIBRARYCLOSE_Disable|
x=304
y=20
width=28
height=15
Command=PUR_StatusBarFunction "Close","MSD"
Help=Close the Peak Purity display
FrameThickness=1






