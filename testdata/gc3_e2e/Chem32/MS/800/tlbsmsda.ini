;------------------------------------------------------------
; tlbsmsda.ini          spectra math toolbar    10-98
;------------------------------------------------------------
;------------------------------------------------------------
;   summation, subtraction, and multiplication
;------------------------------------------------------------


[GraphicalObject]
Name=TLBSMSDA
Path=
Title=
WndStyle=TOOLBAR
PosStyle=RIGHT  
X=0
Y=0
Width=40
Height=160
FrameThickness=0
Activate=0
EraseBk=0
Set0=
RC-DLL=HPCor008.DLL

[ToolDescriptor]
1 = SumSpect , STICKYBUTTON , hpgbut02.dll
2 = SubtrSpect , STICKYBUTTON , hpgbut02.dll
3 = MultiplySpect , STICKYBUTTON , hpgbut02.dll
4 = ClearSpect , PUSHBUTTON , hpgbut02.dll
5 = HelpSpect , PUSHBUTTON , hpgbut02.dll
6 = ExitSpect , PUSHBUTTON , hpgbut02.dll


[STICKYBUTTON MultiplySpect]
ImageList=BMP.tbsmulu|BMP.tbsmuld|BMP.tbsmulud|BMP.tbsmuldd
;ImageList=BMP.tbsmulu|BMP.tbsmuld|BMP.tbsmulud|
Help=Set the scale of ions in the selected range in MS Spectrum Window
x=5 ;00
y=-999 ; 4
width=32
height=32
FrameThickness=2
cmdList= DeactivateMSMultiplySpectraButton | ActivateMSMultiplySpectraButton


[STICKYBUTTON SumSpect]
;ImageList=RBMP.LIBRARYSEARCH|RBMP.LIBRARYSEARCH|RBMP.LIBRARYSEARCH_Disable|
;ImageList=BMP.tbssumu|BMP.tbssumd|BMP.tbssumud|BMP.tbssumdd
ImageList=BMP.tbssumu|BMP.tbssumd|BMP.tbssumud|
x=5 ;00
y=-999 ;42
width=32
height=32
cmdList= | ActivateMSSumSpectraButton
Help=Add selected MS spectrum/spectra to MS Spectrum Window
FrameThickness=2


[STICKYBUTTON SubtrSpect]
;ImageList=BMP.tbssubu|BMP.tbssubd|BMP.tbssubud|BMP.tbssubdd
ImageList=BMP.tbssubu|BMP.tbssubd|BMP.tbssubud|
Help=Subtract selected MS spectrum/spectra from the MS Spectrum Window
x=5 ;00
y=-999 ;76
width=32
height=32
cmdList= | ActivateMSSubtractSpectraButton 
FrameThickness=2



[PushButton ClearSpect]
ImageList=BMP.tbsclr|BMP.tbsclrd|BMP.tbsclrud|
Help=Reset the MS Spectrum Window
x=5 ;00
y=-999 ;114
width=32
height=32
FrameThickness=2
Command=DoMSClearSpectra

[PushButton HelpSpect]
;ImageList=BMP.tbshlp|BMP.tbshlpd|BMP.tbshlpud|
ImageList=BMP.tbshlp|BMP.tbshlpd||
Help=Help on Calculation Toolbar
x=5 ;00
y=-999 ;152
width=32
height=32
FrameThickness=2
Command=DoMSSpectraMathHelp

[PushButton ExitSpect]
ImageList=BMP.tbsxit|BMP.tbsxitd||
Help=Exit the Calculation Toolbar mode
x=5 ;00
y=-999 ;190 
width=32
height=32
FrameThickness=2
Command=DoMSSpectraMathExit

