; Used by \SHARED\SCIEXSVR.DLL and \MS\SCIEXCLI.DLC
; Edit this file can change the Default File name Format codes
; and ChemStation Method or Sequence setting for PE Sciex Analyst
; Format codes: use in the Wiff file name edit box, defined in following 2 section
;   The [CP] means ChemStation CP variable section
;   The [EX] means simply exchange
;     Left of "=" is the Code, right is CP variable or String
[CP]
I=_INSTNAME$
INSTRUMENT=_INSTNAME$
DATAFILE=_DATAFILE$
SEQFILE=_SEQFILE$
METHFILE=_METHFILE$
OPERATOR=_OPERATOR$
DATA=_DATAFILE$
SEQ=_SEQFILE$
M=_METHFILE$
METHOD=_METHFILE$
O=_OPERATOR$
[EX]
A=Agilent Technologies
HP=Hewlett Packard
[Default]
UseMethod=1
; TransMode used in Sequence setting, 1: All data in ONE WIFF, 0: Convert individual data
TransMode=1
AutoConvert=0
LaunchAnalyst=0
FormatedName=0
WiffFileName=
GlobalConcUnit=pg/ul
